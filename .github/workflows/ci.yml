name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    name: バックエンドテスト (PHPUnit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: PHP 8.3 セットアップ
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, json, pdo, pdo_sqlite, sqlite3, bcmath
          coverage: none

      - name: Composer キャッシュ
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}

      - name: 依存パッケージのインストール
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: テスト実行（SQLiteインメモリ）
        run: vendor/bin/phpunit

  frontend-build:
    name: フロントエンド（型チェック＋ビルド＋単体テスト）
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Node 22 セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 依存パッケージのインストール
        run: npm ci

      - name: 型チェック＋ビルド（tsc && vite build）
        run: npm run build

      - name: 単体テスト（Vitest）
        run: npm test
