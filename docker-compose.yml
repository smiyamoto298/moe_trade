services:
  # ── nginx ──────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./backend:/var/www/backend
    depends_on:
      - php
      - frontend
    networks:
      - moe

  # ── PHP / Laravel ───────────────────────────────────────
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/backend
      # vendor はコンテナ内ボリュームに置く（Windowsバインドマウント越しのI/Oを回避）
      - vendor_data:/var/www/backend/vendor
    environment:
      - APP_ENV=local
    depends_on:
      db:
        condition: service_healthy
    networks:
      - moe

  # ── Laravel スケジューラ ────────────────────────────────
  # `schedule:work` が schedule:run を毎分起動し、routes/console.php の定期バッチ
  # （auctions:resolve=15分ごと / listings:expire=毎時 / announcements:purge-expired=毎日6:00）
  # をローカルでも自動実行する。php と同じイメージ・ボリュームを共有する。
  scheduler:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    command: php artisan schedule:work
    volumes:
      - ./backend:/var/www/backend
      - vendor_data:/var/www/backend/vendor
    environment:
      - APP_ENV=local
    depends_on:
      db:
        condition: service_healthy
      php:
        condition: service_started
    restart: unless-stopped
    networks:
      - moe

  # ── React 開発サーバー ────────────────────────────────
  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      # node_modules もコンテナ内ボリュームに置く
      - node_modules_data:/app/node_modules
    command: sh -c "[ -f node_modules/.package-lock.json ] || npm install; npm run dev -- --host"
    ports:
      - "${VITE_PORT:-5173}:5173"
    networks:
      - moe

  # ── MySQL ──────────────────────────────────────────────
  db:
    image: mysql:8.0
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: moe_trade
      MYSQL_USER: moe
      MYSQL_PASSWORD: moe_password
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - moe

  # ── Mailpit (開発用メールサーバー) ──────────────────────
  mailpit:
    image: axllent/mailpit
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"  # Web UI
      - "${MAILPIT_SMTP_PORT:-1025}:1025"  # SMTP
    networks:
      - moe

  # ── phpMyAdmin (開発用) ───────────────────────────────
  phpmyadmin:
    image: phpmyadmin:5
    ports:
      - "${PMA_PORT:-8080}:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: moe
      PMA_PASSWORD: moe_password
    depends_on:
      - db
    networks:
      - moe

volumes:
  db_data:
  vendor_data:
  node_modules_data:

networks:
  moe:
    driver: bridge
