server {
    listen 80;
    server_name localhost;

    # Laravel API・認証系 — 常に public/index.php へ直接渡す
    location ~ ^/(api|email|password|sanctum)(/|$) {
        fastcgi_pass   php:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param  REQUEST_URI     $request_uri;
        fastcgi_param  QUERY_STRING    $query_string;
        fastcgi_param  REQUEST_METHOD  $request_method;
        fastcgi_param  CONTENT_TYPE    $content_type;
        fastcgi_param  CONTENT_LENGTH  $content_length;
        include        fastcgi_params;
    }

    # アップロード画像（/storage/...）は Laravel の公開ストレージから直接配信。
    # dev では storage:link（シンボリックリンク）に依存せず storage/app/public を直接参照する。
    location /storage/ {
        alias /var/www/backend/storage/app/public/;
        try_files $uri =404;
        access_log off;
        expires 7d;
    }

    # React 開発サーバー（Vite）へのプロキシ
    location / {
        proxy_pass         http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
